apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alert-hub-backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/ifrcgo
    chart: ifrcgo-alert-hub-helm
    targetRevision: 0.1.1-develop.c6f10f53
    helm:
      valueFiles:
        - values-go-deploy.yaml
        - values-staging.yaml
      valuesObject:
        app:
          environment: playground
          ingress:
            host: "alerthub-sandbox-api.ifrc.org"
            tls:
              secretName: "alerthub-helm-secret-cert"
          env:
            APP_FRONTEND_HOST: "https://alerthub-sandbox.ifrc.org"
            APP_DOMAIN: "alerthub-sandbox-api.ifrc.org"
            DJANGO_ALLOWED_HOSTS: "alerthub-sandbox-api.ifrc.org"
            SESSION_COOKIE_DOMAIN: ".ifrc.org"
            CSRF_COOKIE_DOMAIN: ".ifrc.org"
            CORS_ALLOWED_ORIGINS: "https://alerthub-sandbox.ifrc.org"
            USE_AZURE_STORAGE: "true"
            AZURE_CLIENT_ID: 690a7bb9-bd7c-4419-8f57-e5d6f66e0386
            AZURE_TENANT_ID: a2b53be5-734e-4e6c-ab0d-d184f60fd917
            AZURE_STORAGE_MEDIA_CONTAINER: alert-hub-playground-media-container
            AZURE_STORAGE_STATIC_CONTAINER: alert-hub-playground-static-container
            AZURE_STORAGE_ACCOUNT_NAME: goplaygroundstorage
            AZURE_STORAGE_MANAGED_IDENTITY: "true"
          serviceAccount:
            annotations:
              azure.workload.identity/client-id: "690a7bb9-bd7c-4419-8f57-e5d6f66e0386"
          secretsStoreCsiDriver:
            parameters:
              clientID: "690a7bb9-bd7c-4419-8f57-e5d6f66e0386"
              keyvaultName: "alert-hub-playground-key"
              tenantId: "a2b53be5-734e-4e6c-ab0d-d184f60fd917"
  destination:
    server: https://kubernetes.default.svc
    namespace: alert-hub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
